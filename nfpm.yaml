# nFPM configuration for gspy
# https://nfpm.pdok.dev/
name: "gspy"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
section: "security"
priority: "extra"
maintainer: "Mutasem Kharma <mutasem@gspy.dev>"
description: "Forensic goroutine-to-syscall inspector for live Go processes using eBPF."
vendor: "gspy"
homepage: "https://github.com/Mutasem-mk4/gspy"
license: "GPL-2.0-only"

contents:
  - src: "bin/gspy"
    dst: "/usr/bin/gspy"
    file_info:
      mode: 0755
  - src: "man/gspy.1.gz"
    dst: "/usr/share/man/man1/gspy.1.gz"
    file_info:
      mode: 0644
  - src: "LICENSE"
    dst: "/usr/share/doc/gspy/copyright"
  - src: "README.md"
    dst: "/usr/share/doc/gspy/README.md"

overrides:
  deb:
    depends:
      - libc6
    recommends:
      - clang (>= 14)
  rpm:
    depends:
      - glibc
