# SPDX-License-Identifier: GPL-2.0-only
# CI/CD pipeline for gspy — forensic goroutine-to-syscall inspector
#
# This workflow:
#   1. Runs the full test suite with race detector (mock BPF, no root)
#   2. Runs golangci-lint for code quality
#   3. Compiles BPF bytecode from C using clang + bpf2go
#   4. Builds the Go binary with reproducible flags
#   5. Creates release artifacts on tag push

name: Build & Test

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

permissions:
  contents: write  # needed for release uploads

env:
  GO_VERSION: '1.21'
  CLANG_VERSION: '16'

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Lint — fast feedback on code quality
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          # Only lint packages that compile without generated BPF code.
          # loader.go has build tag "linux && !testing" so it's excluded.
          # The bpf/ directory is outside any Go package, so no C file issues.
          args: --timeout=5m --build-tags=testing
          skip-pkg-cache: true

  # ─────────────────────────────────────────────────────────
  # Job 2: Test — run tests using mock BPF layer
  # ─────────────────────────────────────────────────────────
  test:
    name: Test (mock BPF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with race detector
        run: go test -v -race -count=1 -tags=testing ./...

      - name: Check test coverage
        run: |
          go test -tags=testing -coverprofile=cover.out ./internal/attach/... ./internal/proc/... ./internal/ui/...
          go tool cover -func=cover.out | tail -1

  # ─────────────────────────────────────────────────────────
  # Job 3: BPF Generate + Build — the real compilation
  # ─────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux amd64)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-${{ env.CLANG_VERSION }} \
            llvm-${{ env.CLANG_VERSION }} \
            libbpf-dev \
            linux-headers-$(uname -r) \
            linux-tools-common \
            linux-tools-$(uname -r) || true

          # Symlink clang tools to the versioned binaries
          sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang
          sudo ln -sf /usr/bin/llc-${{ env.CLANG_VERSION }} /usr/bin/llc
          sudo ln -sf /usr/bin/llvm-strip-${{ env.CLANG_VERSION }} /usr/bin/llvm-strip

          # Verify toolchain
          clang --version
          uname -r

      - name: Generate vmlinux.h from kernel BTF
        run: |
          KERNEL=$(uname -r)
          echo "Runner kernel: $KERNEL"
          
          # Install linux-tools for the azure kernel
          # GitHub runners use Azure kernels; the matching package may or may not exist
          sudo apt-get install -y "linux-tools-${KERNEL}" 2>/dev/null || true
          
          # Find a working bpftool binary (not the wrapper)
          BPFTOOL=""
          for candidate in $(find /usr/lib/linux-tools/ -name bpftool -type f 2>/dev/null); do
            if [ -x "$candidate" ] && "$candidate" version &>/dev/null; then
              BPFTOOL="$candidate"
              echo "Found working bpftool: $BPFTOOL"
              break
            fi
          done
          
          if [ -n "$BPFTOOL" ] && [ -f /sys/kernel/btf/vmlinux ]; then
            "$BPFTOOL" btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h
            echo "Generated vmlinux.h from kernel BTF ($(wc -l < bpf/vmlinux.h) lines)"
          else
            echo "Cannot generate vmlinux.h from this kernel. Using bundled minimal vmlinux.h..."
            cat > bpf/vmlinux.h << 'VMLINUX_EOF'
          #ifndef __VMLINUX_H__
          #define __VMLINUX_H__
          
          typedef unsigned char __u8;
          typedef unsigned short __u16;
          typedef unsigned int __u32;
          typedef unsigned long long __u64;
          typedef signed char __s8;
          typedef signed short __s16;
          typedef signed int __s32;
          typedef signed long long __s64;
          typedef __u16 __le16;
          typedef __u32 __le32;
          typedef __u64 __le64;
          typedef __u16 __be16;
          typedef __u32 __be32;
          typedef __u64 __be64;
          typedef __u32 __wsum;
          typedef _Bool bool;
          
          enum { false = 0, true = 1 };
          
          /* BPF map types used by gspy */
          enum bpf_map_type {
            BPF_MAP_TYPE_UNSPEC = 0,
            BPF_MAP_TYPE_HASH = 1,
            BPF_MAP_TYPE_ARRAY = 2,
            BPF_MAP_TYPE_PROG_ARRAY = 3,
            BPF_MAP_TYPE_PERF_EVENT_ARRAY = 4,
            BPF_MAP_TYPE_PERCPU_HASH = 5,
            BPF_MAP_TYPE_PERCPU_ARRAY = 6,
            BPF_MAP_TYPE_STACK_TRACE = 7,
            BPF_MAP_TYPE_CGROUP_ARRAY = 8,
            BPF_MAP_TYPE_LRU_HASH = 9,
            BPF_MAP_TYPE_LRU_PERCPU_HASH = 10,
            BPF_MAP_TYPE_LPM_TRIE = 11,
            BPF_MAP_TYPE_ARRAY_OF_MAPS = 12,
            BPF_MAP_TYPE_HASH_OF_MAPS = 13,
            BPF_MAP_TYPE_DEVMAP = 14,
            BPF_MAP_TYPE_SOCKMAP = 15,
            BPF_MAP_TYPE_CPUMAP = 16,
            BPF_MAP_TYPE_XSKMAP = 17,
            BPF_MAP_TYPE_SOCKHASH = 18,
            BPF_MAP_TYPE_CGROUP_STORAGE = 19,
            BPF_MAP_TYPE_REUSEPORT_SOCKARRAY = 20,
            BPF_MAP_TYPE_PERCPU_CGROUP_STORAGE = 21,
            BPF_MAP_TYPE_QUEUE = 22,
            BPF_MAP_TYPE_STACK = 23,
            BPF_MAP_TYPE_SK_STORAGE = 24,
            BPF_MAP_TYPE_DEVMAP_HASH = 25,
            BPF_MAP_TYPE_STRUCT_OPS = 26,
            BPF_MAP_TYPE_RINGBUF = 27,
            BPF_MAP_TYPE_INODE_STORAGE = 28,
            BPF_MAP_TYPE_TASK_STORAGE = 29,
          };
          
          /* BPF map update flags */
          #define BPF_ANY 0
          #define BPF_NOEXIST 1
          #define BPF_EXIST 2
          
          /* BPF get_stack flags */
          #define BPF_F_USER_STACK (1ULL << 8)
          
          /* x86_64 pt_regs — register state at uprobe entry */
          struct pt_regs {
            unsigned long r15, r14, r13, r12;
            unsigned long bp;
            unsigned long bx;
            unsigned long r11, r10, r9, r8;
            unsigned long ax, cx, dx, si, di;
            unsigned long orig_ax;
            unsigned long ip, cs;
            unsigned long flags;
            unsigned long sp, ss;
          };
          
          /* Networking structs referenced by bpf_helper_defs.h */
          struct __sk_buff { int len; };
          struct xdp_md { int data; };
          struct bpf_sock { int family; };
          struct bpf_sock_addr { int family; };
          struct bpf_sock_ops { int op; };
          struct sk_msg_md { int size; };
          struct bpf_perf_event_data { int addr; };
          struct bpf_cgroup_dev_ctx { int major; };
          struct bpf_sysctl { int write; };
          struct bpf_sockopt { int optname; };
          struct sk_reuseport_md { int len; };
          struct bpf_dynptr { };
          struct bpf_sk_lookup { int family; };
          
          /* tracepoint context for raw_syscalls/sys_enter */
          struct trace_event_raw_sys_enter {
            unsigned long long unused;
            long id;
            unsigned long args[6];
          };
          
          /* tracepoint context for raw_syscalls/sys_exit */
          struct trace_event_raw_sys_exit {
            unsigned long long unused;
            long id;
            long ret;
          };
          
          #endif /* __VMLINUX_H__ */
          VMLINUX_EOF
            echo "Created minimal vmlinux.h for CO-RE compilation"
          fi
          
          test -s bpf/vmlinux.h || { echo "ERROR: vmlinux.h is empty"; exit 1; }

      - name: Install bpf2go
        run: go install github.com/cilium/ebpf/cmd/bpf2go@v0.14.0

      - name: Generate BPF bytecode
        run: |
          cd internal/bpf
          # bpf2go requires GOPACKAGE when not invoked via go generate
          export GOPACKAGE=bpf
          bpf2go \
            -cc clang \
            -target bpfel \
            -type goroutine_meta \
            -type syscall_event \
            gspy ../../bpf/gspy.bpf.c -- \
            -I/usr/include \
            -I../../bpf \
            -O2 -g \
            -DBPF_NO_PRESERVE_ACCESS_INDEX

      - name: Build gspy binary
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          GO_VERSION=$(go version | awk '{print $3}')
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildGoVersion=${GO_VERSION}" \
            -o bin/gspy \
            ./cmd/gspy

      - name: Verify binary
        run: |
          file bin/gspy
          bin/gspy --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gspy-linux-amd64
          path: bin/gspy
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Job 4: Release — create GitHub release on tag push
  # ─────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gspy-linux-amd64
          path: release/

      - name: Compress binary
        run: |
          cd release
          chmod +x gspy
          tar czf gspy-linux-amd64.tar.gz gspy
          sha256sum gspy-linux-amd64.tar.gz > SHA256SUMS.txt
          sha256sum gspy >> SHA256SUMS.txt

      - name: Compress man page
        run: gzip -k man/gspy.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/gspy-linux-amd64.tar.gz
            release/SHA256SUMS.txt
            man/gspy.1.gz
