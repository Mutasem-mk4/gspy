# SPDX-License-Identifier: GPL-2.0-only
# CI/CD pipeline for gspy — forensic goroutine-to-syscall inspector
#
# This workflow:
#   1. Compiles BPF bytecode from C using clang + bpf2go
#   2. Builds the Go binary with reproducible flags
#   3. Runs the full test suite with race detector
#   4. Runs golangci-lint for code quality
#   5. Creates release artifacts on tag push

name: Build & Test

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

permissions:
  contents: write  # needed for release uploads

env:
  GO_VERSION: '1.21'
  CLANG_VERSION: '16'

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Lint — fast feedback on code quality
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m
          # Skip packages that require generated BPF code
          # (loader.go has linux build tag, won't compile here)
          skip-pkg-cache: true

  # ─────────────────────────────────────────────────────────
  # Job 2: Test — run tests using mock BPF layer
  # ─────────────────────────────────────────────────────────
  test:
    name: Test (mock BPF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with race detector
        run: go test -v -race -count=1 ./...

      - name: Check test coverage
        run: |
          go test -coverprofile=cover.out ./internal/attach/... ./internal/proc/... ./internal/ui/...
          go tool cover -func=cover.out | tail -1

  # ─────────────────────────────────────────────────────────
  # Job 3: BPF Generate + Build — the real compilation
  # ─────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux amd64)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-${{ env.CLANG_VERSION }} \
            llvm-${{ env.CLANG_VERSION }} \
            libbpf-dev \
            linux-headers-$(uname -r) \
            linux-tools-common \
            linux-tools-$(uname -r) || true

          # Symlink clang to the versioned binary
          sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang
          sudo ln -sf /usr/bin/llc-${{ env.CLANG_VERSION }} /usr/bin/llc

          # Verify toolchain
          clang --version
          uname -r

      - name: Generate vmlinux.h from kernel BTF
        run: |
          # Try bpftool first; fall back to downloading a prebuilt vmlinux.h
          if command -v bpftool &> /dev/null && [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/bpf/vmlinux.h
            echo "Generated vmlinux.h from running kernel BTF"
          else
            echo "bpftool or BTF not available, downloading prebuilt vmlinux.h"
            # Use libbpf's bundled vmlinux.h for the GitHub runner's kernel
            curl -sSL \
              "https://raw.githubusercontent.com/libbpf/libbpf/master/src/bpf_helpers.h" \
              -o /dev/null  # Just verify connectivity
            # Generate a minimal vmlinux.h from the kernel headers
            echo "Attempting to generate from kernel headers..."
            sudo apt-get install -y bpftool 2>/dev/null || true
            if [ -f /sys/kernel/btf/vmlinux ]; then
              bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/bpf/vmlinux.h
            else
              echo "WARNING: No BTF available. Using fallback vmlinux.h"
              # Download a known-good vmlinux.h for 5.15+ kernels
              curl -sSL \
                "https://raw.githubusercontent.com/cilium/ebpf/main/btf/testdata/vmlinux.btf.gz" \
                -o /tmp/vmlinux.btf.gz || true
            fi
          fi

      - name: Install bpf2go
        run: go install github.com/cilium/ebpf/cmd/bpf2go@v0.14.0

      - name: Generate BPF bytecode
        run: |
          cd internal/bpf
          # Run bpf2go directly (matches the go:generate directive in loader.go)
          bpf2go \
            -cc clang \
            -target bpfel \
            -type goroutine_meta \
            -type syscall_event \
            gspy gspy.bpf.c -- \
            -I/usr/include \
            -I. \
            -O2 -g \
            -DBPF_NO_PRESERVE_ACCESS_INDEX

      - name: Build gspy binary
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          GO_VERSION=$(go version | awk '{print $3}')
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildGoVersion=${GO_VERSION}" \
            -o bin/gspy \
            ./cmd/gspy

      - name: Verify binary
        run: |
          file bin/gspy
          bin/gspy --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gspy-linux-amd64
          path: bin/gspy
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Job 4: Release — create GitHub release on tag push
  # ─────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gspy-linux-amd64
          path: release/

      - name: Compress binary
        run: |
          cd release
          chmod +x gspy
          tar czf gspy-linux-amd64.tar.gz gspy
          sha256sum gspy-linux-amd64.tar.gz > SHA256SUMS.txt
          sha256sum gspy >> SHA256SUMS.txt

      - name: Compress man page
        run: gzip -k man/gspy.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/gspy-linux-amd64.tar.gz
            release/SHA256SUMS.txt
            man/gspy.1.gz
