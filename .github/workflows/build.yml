# SPDX-License-Identifier: GPL-2.0-only
# CI/CD pipeline for gspy — forensic goroutine-to-syscall inspector
#
# This workflow:
#   1. Runs the full test suite with race detector (mock BPF, no root)
#   2. Runs golangci-lint for code quality
#   3. Compiles BPF bytecode from C using clang + bpf2go
#   4. Builds the Go binary with reproducible flags
#   5. Creates release artifacts on tag push

name: Build & Test

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

permissions:
  contents: write  # needed for release uploads

env:
  GO_VERSION: '1.21'
  CLANG_VERSION: '16'

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Lint — fast feedback on code quality
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          # Only lint packages that compile without generated BPF code.
          # loader.go has build tag "linux && !testing" so it's excluded.
          # The bpf/ directory is outside any Go package, so no C file issues.
          args: --timeout=5m --build-tags=testing
          skip-pkg-cache: true

  # ─────────────────────────────────────────────────────────
  # Job 2: Test — run tests using mock BPF layer
  # ─────────────────────────────────────────────────────────
  test:
    name: Test (mock BPF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with race detector
        run: go test -v -race -count=1 -tags=testing ./...

      - name: Check test coverage
        run: |
          go test -tags=testing -coverprofile=cover.out ./internal/attach/... ./internal/proc/... ./internal/ui/...
          go tool cover -func=cover.out | tail -1

  # ─────────────────────────────────────────────────────────
  # Job 3: BPF Generate + Build — the real compilation
  # ─────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux amd64)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-${{ env.CLANG_VERSION }} \
            llvm-${{ env.CLANG_VERSION }} \
            libbpf-dev \
            linux-headers-$(uname -r) \
            linux-tools-common \
            linux-tools-$(uname -r) || true

          # Symlink clang to the versioned binary
          sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang
          sudo ln -sf /usr/bin/llc-${{ env.CLANG_VERSION }} /usr/bin/llc

          # Verify toolchain
          clang --version
          uname -r

      - name: Generate vmlinux.h from kernel BTF
        run: |
          # GitHub runners have BTF but bpftool may be at a versioned path.
          # Try multiple approaches to find bpftool.
          BPFTOOL=""
          
          # Method 1: bpftool in PATH
          if command -v bpftool &> /dev/null; then
            BPFTOOL="bpftool"
          fi
          
          # Method 2: versioned linux-tools path (Ubuntu runners)
          if [ -z "$BPFTOOL" ]; then
            KERNEL=$(uname -r)
            VERSIONED="/usr/lib/linux-tools/${KERNEL}/bpftool"
            if [ -f "$VERSIONED" ]; then
              BPFTOOL="$VERSIONED"
            fi
          fi
          
          # Method 3: install linux-tools-generic and try again
          if [ -z "$BPFTOOL" ]; then
            sudo apt-get install -y linux-tools-$(uname -r) linux-tools-generic 2>/dev/null || true
            if command -v bpftool &> /dev/null; then
              BPFTOOL="bpftool"
            fi
            # Check versioned path again
            KERNEL=$(uname -r)
            for path in /usr/lib/linux-tools/*/bpftool; do
              if [ -f "$path" ]; then
                BPFTOOL="$path"
                break
              fi
            done
          fi

          if [ -n "$BPFTOOL" ] && [ -f /sys/kernel/btf/vmlinux ]; then
            echo "Using bpftool at: $BPFTOOL"
            $BPFTOOL btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h
            echo "Generated vmlinux.h from running kernel BTF"
          else
            echo "BTF not available via bpftool. Downloading prebuilt vmlinux.h..."
            # Download a prebuilt vmlinux.h for a recent Ubuntu kernel
            curl -sSL \
              "https://raw.githubusercontent.com/libbpf/libbpf-bootstrap/master/vmlinux/vmlinux.h" \
              -o bpf/vmlinux.h
            echo "Downloaded prebuilt vmlinux.h"
          fi
          
          # Verify vmlinux.h was generated
          ls -la bpf/vmlinux.h
          wc -l bpf/vmlinux.h

      - name: Install bpf2go
        run: go install github.com/cilium/ebpf/cmd/bpf2go@v0.14.0

      - name: Generate BPF bytecode
        run: |
          cd internal/bpf
          # Run bpf2go directly (matches the go:generate directive in loader.go)
          # Source is at ../../bpf/gspy.bpf.c, includes from ../../bpf/
          bpf2go \
            -cc clang \
            -target bpfel \
            -type goroutine_meta \
            -type syscall_event \
            gspy ../../bpf/gspy.bpf.c -- \
            -I/usr/include \
            -I../../bpf \
            -O2 -g \
            -DBPF_NO_PRESERVE_ACCESS_INDEX

      - name: Build gspy binary
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          GO_VERSION=$(go version | awk '{print $3}')
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildGoVersion=${GO_VERSION}" \
            -o bin/gspy \
            ./cmd/gspy

      - name: Verify binary
        run: |
          file bin/gspy
          bin/gspy --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gspy-linux-amd64
          path: bin/gspy
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Job 4: Release — create GitHub release on tag push
  # ─────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gspy-linux-amd64
          path: release/

      - name: Compress binary
        run: |
          cd release
          chmod +x gspy
          tar czf gspy-linux-amd64.tar.gz gspy
          sha256sum gspy-linux-amd64.tar.gz > SHA256SUMS.txt
          sha256sum gspy >> SHA256SUMS.txt

      - name: Compress man page
        run: gzip -k man/gspy.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/gspy-linux-amd64.tar.gz
            release/SHA256SUMS.txt
            man/gspy.1.gz
